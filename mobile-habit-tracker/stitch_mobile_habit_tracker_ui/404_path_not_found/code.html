<!DOCTYPE html>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #fbf9f3;
        font-family: 'Inter', sans-serif;
      }
      .headline-font {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#fbf9f3] dark:bg-stone-950 flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-[#92004c] dark:text-[#be0065] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<div class="font-['Plus_Jakarta_Sans'] font-semibold tracking-tight text-xl font-bold tracking-widest text-[#92004c] dark:text-[#f10080] uppercase">
            THE RITUAL
        </div>
<div class="w-6"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content: 404 Screen -->
<main class="flex-grow flex flex-col items-center justify-center px-8 py-12 text-center max-w-4xl mx-auto w-full">
<!-- Asymmetric Visual Composition -->
<div class="relative w-full mb-12 flex justify-center">
<!-- Background Decorative Element (Organic Asymmetry) -->
<div class="absolute -top-10 -left-10 w-64 h-64 bg-primary-fixed/20 rounded-full blur-3xl"></div>
<!-- Main Illustration Container -->
<div class="relative z-10">
<div class="w-72 h-72 md:w-96 md:h-96 rounded-full overflow-hidden bg-surface-container-low shadow-[0_32px_64px_-12px_rgba(27,28,24,0.08)] flex items-center justify-center">
<img alt="A lonely winding path disappearing into soft mountain mist at dawn with ethereal light" class="w-full h-full object-cover opacity-80 grayscale-[0.2]" data-alt="A lonely winding path disappearing into soft mountain mist at dawn with ethereal light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPTYPClzpQoYDVBmMhpgdKqc5mpcDK4y8BVBM8DnT5BwfmzUtLTuk7j9hXszsZasoTw_HEODxlRA60UtfJnHw_arw_-hDTD2hkXWkveMEgZu0rl0xokoI68xNi4IPMQN2KGplwftrQtlOVYKl23e-iUmF5N1blznMchsVMGohB6za2PXD83Aw9wzCclczdzAwHLl4xcg_PwrFYQpeKfzkEL6HW55CjdAzNcFEyZFmtZarJGB6zFTvGad3blTz3K_l7O4y35DlhkSQ"/>
<!-- Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
</div>
<!-- Floating Icon (Glassmorphism) -->
<div class="absolute -bottom-6 -right-6 md:right-0 bg-surface-container-lowest/70 backdrop-blur-xl p-6 rounded-full shadow-[0_32px_32px_-4px_rgba(27,28,24,0.06)] border border-outline-variant/15 active:scale-95 transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-5xl md:text-6xl" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
</div>
</div>
<!-- Typography -->
<div class="space-y-6 max-w-2xl">
<h1 class="headline-font font-extrabold text-7xl md:text-9xl text-primary tracking-tighter opacity-15 select-none">
                404
            </h1>
<div class="-mt-12 md:-mt-16 relative z-20">
<h2 class="headline-font font-semibold text-3xl md:text-4xl text-on-surface tracking-tight leading-tight">
                    The path has faded.
                </h2>
<p class="mt-4 text-on-surface-variant text-lg md:text-xl font-body leading-relaxed opacity-80">
                    Even the most dedicated path can have its detours. Your lost ritual is just a step away from being found again.
                </p>
</div>
</div>
<!-- Call to Action -->
<div class="mt-12 flex flex-col sm:flex-row gap-4 items-center">
<button class="px-8 py-4 bg-primary-container text-white rounded-full headline-font font-bold tracking-wide shadow-[0_12px_24px_-8px_rgba(181,0,95,0.4)] hover:bg-secondary-container active:scale-95 transition-all duration-300 flex items-center gap-2 group">
                Return to Ritual
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="px-8 py-4 bg-transparent text-primary headline-font font-semibold hover:bg-surface-container-high rounded-full transition-colors">
                Report Detour
            </button>
</div>
<!-- Subtle Navigation Aid Chips -->
<div class="mt-16 flex flex-wrap justify-center gap-3">
<span class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-full text-xs font-label uppercase tracking-widest border border-outline-variant/10">Journal</span>
<span class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-full text-xs font-label uppercase tracking-widest border border-outline-variant/10">Insights</span>
<span class="px-4 py-2 bg-surface-container-high text-on-surface-variant rounded-full text-xs font-label uppercase tracking-widest border border-outline-variant/10">Community</span>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused 404, but implemented as per instruction requirement to use shared components) -->
<!-- Applying "Shell Visibility" logic: Since this is a 404 "dead end", typically suppressed, but I will include it for consistency as requested -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#fbf9f3]/80 dark:bg-stone-950/80 backdrop-blur-xl border-t border-[#1b1c18]/5 shadow-[0_-8px_32px_-4px_rgba(27,28,24,0.06)] rounded-t-[24px]">
<div class="flex flex-col items-center justify-center text-stone-400 p-3 hover:text-[#be0065] transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] uppercase tracking-widest mt-1">Rituals</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 p-3 hover:text-[#be0065] transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] uppercase tracking-widest mt-1">Journal</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 p-3 hover:text-[#be0065] transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] uppercase tracking-widest mt-1">Insights</span>
</div>
<!-- Profile active if we consider 404 a 'user' context state or none -->
<div class="flex flex-col items-center justify-center text-stone-400 p-3 hover:text-[#be0065] transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] uppercase tracking-widest mt-1">Profile</span>
</div>
</nav>
<!-- Bottom Padding to ensure content isn't hidden by NavBar -->
<div class="h-24"></div>
</body></html>
