<div class="settings-page">
  <!-- TopAppBar -->
  <header class="settings-header">
    <div class="header-left">
      <button class="icon-btn text-primary" onclick="history.back()">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <h1>Settings</h1>
    </div>
    <div class="avatar-ring">
      <img class="avatar-img" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuYLYNj7qdAknQMiv2DnSMjsoGaEscNZahMrsH42cS4JtNuAidy_peC1Q5pM2C4RkOM7aoMv9NMyaa8hwt1_YlBXb_Br7rSIPZel2No_a34l3hkoRXpsHF_yXzMYdeVRpYwqm75palvYA6kun9m9P52aq68qSCVbssXEq8vLOYJ-96z83FnXVCdTkMihs6aYOpgcpP-TqUjrHPe1fD-_V6AUDLPs2mMaCnRcx-qeLPR-dDoWORRG7PaEf39yRDARUPiQltU3-NqGo"/>
    </div>
  </header>

  <main class="settings-main">
    <div class="settings-hero">
      <span class="eyebrow">System Preferences</span>
      <h2>Your Habit-Tracker Workspace</h2>
      <p>Run after your habits to build momentum.</p>
    </div>

    <!-- Vertical List of Options -->
    <div class="options-list">
      <!-- Data Management (Reset) -->
      <section class="option-card">
        <div class="option-content">
          <div class="option-text">
            <span>Data Management</span>
            <p>Clear all progress and start fresh.</p>
          </div>
          <button class="danger-btn outline" (click)="resetData()">Reset data</button>
        </div>
      </section>

      <!-- Visual Break -->
      <div class="visual-break">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAO_AIRDCeUyZQeiZESOSt2a4L6aKhOEQmatScs1Chh3TWWIhPjqkRABCGhwsX_yavGefOTL9-Q41EwqDOnsUNwPEQtMA08kEUmDk4K93-KnulcIJ-ikvDe5ioErxZ1EsWzcFQgPml1K0t7ssKZDsvbKh05m5xss1hB2hdy8lmyxCmV7NIeC219I9w4hIHVejLeMYo-KdGy47qLQEx737of0HXs48RcLI2VjC-8W8x13xcDXeT-R2b7aQ8l5S-_LYnSQ85beeDajQY" alt="aesthetic notebook">
        <div class="overlay-gradient"></div>
        <div class="quote-text">
          <p>"Progress is a journey of patience."</p>
        </div>
      </div>

      <!-- Support Links -->
      <div class="support-links">
        <h3>Support &amp; Privacy</h3>
        <div class="link-item">
          <div class="link-left">
            <span class="material-symbols-outlined text-primary">shield</span>
            <span>Privacy Policy</span>
          </div>
          <span class="material-symbols-outlined icon-faded">chevron_right</span>
        </div>
        <div class="link-item">
          <div class="link-left">
            <span class="material-symbols-outlined text-primary">help</span>
            <span>Help Center</span>
          </div>
          <span class="material-symbols-outlined icon-faded">chevron_right</span>
        </div>
      </div>
    </div>
  </main>
</div>
